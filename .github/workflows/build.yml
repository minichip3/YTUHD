name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build-sideload:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Install YouTubeHeader and PSHeader
        run: |
          git clone --depth 1 https://github.com/PoomSmart/YouTubeHeader "$THEOS/include/YouTubeHeader"
          git clone --depth 1 https://github.com/PoomSmart/PSHeader "$THEOS/include/PSHeader"

      - name: Install build dependencies
        run: brew install meson ninja

      - name: Build vendored codec libraries
        run: |
          make libvpx
          make dav1d

      - name: Build SIDELOAD package
        run: |
          make clean
          make package SIDELOAD=1 FINALPACKAGE=1

      - name: Build bundled CydiaSubstrate (ellekit)
        run: |
          git clone --depth 1 https://github.com/evelyneee/ellekit /tmp/ellekit
          cd /tmp/ellekit
          xcodebuild -scheme ellekit -configuration Release \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            -destination 'generic/platform=iOS' BUILD_DIR="build/"
          ldid -S build/Release-iphoneos/libellekit.dylib

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp .theos/obj/*.dylib artifacts/
          cp packages/*.deb artifacts/

          # Bundle a copy of ellekit (Substrate-API compatible) as a relocatable
          # CydiaSubstrate.framework next to the tweak, since environments like
          # LiveContainer don't provide the real /Library/Frameworks copy. Point
          # YTUHD.dylib's dependency at it via @loader_path instead of the
          # absolute jailbreak path.
          mkdir -p "artifacts/CydiaSubstrate.framework"
          cp /tmp/ellekit/build/Release-iphoneos/libellekit.dylib "artifacts/CydiaSubstrate.framework/CydiaSubstrate"
          install_name_tool -change \
            /Library/Frameworks/CydiaSubstrate.framework/CydiaSubstrate \
            @loader_path/CydiaSubstrate.framework/CydiaSubstrate \
            artifacts/YTUHD.dylib
          ldid -S artifacts/YTUHD.dylib

          lipo -info artifacts/*.dylib artifacts/CydiaSubstrate.framework/CydiaSubstrate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YTUHD-sideload
          path: artifacts/
