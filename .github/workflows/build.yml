name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build-sideload:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Install YouTubeHeader and PSHeader
        run: |
          git clone --depth 1 https://github.com/PoomSmart/YouTubeHeader "$THEOS/include/YouTubeHeader"
          git clone --depth 1 https://github.com/PoomSmart/PSHeader "$THEOS/include/PSHeader"

      - name: Install build dependencies
        run: brew install meson ninja

      - name: Build vendored codec libraries
        run: |
          make libvpx
          make dav1d

      - name: Build SIDELOAD package
        run: |
          make clean
          make package SIDELOAD=1 FINALPACKAGE=1

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp .theos/obj/*.dylib artifacts/
          cp packages/*.deb artifacts/

          # Repoint the CydiaSubstrate dependency at a relative, same-folder
          # path instead of the absolute jailbreak path, so a CydiaSubstrate.framework
          # placed next to YTUHD.dylib (e.g. in the same Tweaks folder) is used
          # instead of requiring /Library/Frameworks/CydiaSubstrate.framework.
          install_name_tool -change \
            /Library/Frameworks/CydiaSubstrate.framework/CydiaSubstrate \
            @loader_path/CydiaSubstrate.framework/CydiaSubstrate \
            artifacts/YTUHD.dylib
          ldid -S artifacts/YTUHD.dylib

          lipo -info artifacts/*.dylib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: YTUHD-sideload
          path: artifacts/
